server {
    listen 80;
    server_name localhost;
    
    # Apuntamos a la raíz donde está tu index.php
    root /var/www/symfony;
    index index.php;

    location / {
        # Intenta servir el archivo real, si no, redirige al index.php de la raíz
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
    fastcgi_pass symfony_php:9000;
    fastcgi_split_path_info ^(.+\.php)(/.*)$;
    include fastcgi_params;
    # Usamos $document_root para que sea dinámico
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param DOCUMENT_ROOT $document_root;
    internal;
   }

    # Bloquear acceso a archivos sensibles
    location ~ /\. {
        deny all;
    }

    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}