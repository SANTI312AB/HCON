services:
  # Servidor de Base de Datos
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver2022
    restart: "no"
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "SqlServer123"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./db:/var/opt/mssql/import
    networks:
      - app_network

  # Motor de PHP (Tu proyecto Symfony)
  php:
    build:
      context: .
      dockerfile: ./Docker/Dockerfile # <-- Ajustado: Ruta relativa desde la raíz
    container_name: symfony_php
    restart: "no"
    volumes:
      - .:/var/www/symfony:delegated
    depends_on:
      - sqlserver
    networks:
      - app_network

  # Servidor Web Nginx
  nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    restart: "no"
    ports:
      - "80:80"
    volumes:
      - .:/var/www/symfony:delegated
      - ./Docker/nginx/default.conf:/etc/nginx/conf.d/default.conf # <-- Ajustado: Mayúscula en Docker
    depends_on:
      - php
    networks:
      - app_network

volumes:
  sqlserver_data:

networks:
  app_network:
    driver: bridge